<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="墨阅 - 桌面端小说阅读器" />
  <title>墨阅</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    #app-loading {
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #app-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader-logo {
      font-family: "Cormorant Garamond", Georgia, serif;
      color: #d4a017;
      font-size: 48px;
      letter-spacing: 0.2em;
      margin-bottom: 24px;
      text-shadow: 0 0 20px rgba(212, 160, 23, 0.3);
    }
    .loader-subtitle {
      font-family: "DM Sans", system-ui, sans-serif;
      color: rgba(160, 152, 136, 0.5);
      font-size: 11px;
      letter-spacing: 0.3em;
      margin-bottom: 32px;
      text-transform: uppercase;
    }
    .loader-dots {
      display: flex;
      gap: 8px;
    }
    .loader-dot {
      width: 6px;
      height: 6px;
      background: #d4a017;
      border-radius: 50%;
      animation: breathe 1.4s infinite ease-in-out both;
    }
    .loader-dot:nth-child(1) { animation-delay: 0s; }
    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes breathe {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
      40% { transform: scale(1.2); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app-loading">
    <div class="loader-logo">墨 阅</div>
    <div class="loader-subtitle">AbyssReader</div>
    <div class="loader-dots">
      <span class="loader-dot"></span>
      <span class="loader-dot"></span>
      <span class="loader-dot"></span>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
